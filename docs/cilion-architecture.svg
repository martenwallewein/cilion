<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="100%" height="100%">
    <defs>
        <!-- Arrowheads -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0052cc" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53935" />
        </marker>
        
        <!-- Gradients -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f8f9fa"/>
            <stop offset="100%" stop-color="#e9ecef"/>
        </linearGradient>
        <linearGradient id="scion-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffebee"/>
            <stop offset="100%" stop-color="#ffcdd2"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="950" fill="url(#bg-grad)" rx="15" />

    <!-- ========================================== -->
    <!-- TOP SECTION: MACRO TOPOLOGY (WAN LAYER)    -->
    <!-- ========================================== -->
    <text x="50" y="40" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">1. Global WAN Topology (SCION Overlay)</text>

    <!-- Cluster A -->
    <rect x="50" y="70" width="280" height="180" rx="10" fill="#ffffff" stroke="#0052cc" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="65" y="100" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0052cc">Cluster A (AWS)</text>
    <text x="65" y="125" font-family="sans-serif" font-size="14" fill="#666">Role: SCION Edge AS</text>
    <text x="65" y="145" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">ASN: ffaa:0:1101</text>
    
    <rect x="90" y="170" width="200" height="60" rx="8" fill="#e3f2fd" stroke="#0052cc" stroke-width="2"/>
    <text x="190" y="205" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0052cc" text-anchor="middle">Worker Nodes</text>

    <!-- SCION Transit Core -->
    <path d="M 450 120 C 450 80, 500 70, 550 70 C 650 70, 750 70, 800 120 C 830 150, 830 200, 800 230 C 750 270, 650 270, 550 270 C 480 270, 430 230, 450 180 Z" fill="url(#scion-grad)" stroke="#e53935" stroke-width="3"/>
    <text x="615" y="130" font-family="sans-serif" font-size="18" font-weight="bold" fill="#c62828" text-anchor="middle">SCION Transit Provider</text>
    <text x="615" y="155" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">Role: SCION Core AS</text>
    <text x="615" y="175" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">ASN: 64:0:anap</text>
    <rect x="525" y="195" width="180" height="40" rx="5" fill="#fff" stroke="#c62828" stroke-width="2"/>
    <text x="615" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">SCION Border Routers</text>

    <!-- Cluster B -->
    <rect x="870" y="70" width="280" height="180" rx="10" fill="#ffffff" stroke="#0052cc" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="885" y="100" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0052cc">Cluster B (Azure)</text>
    <text x="885" y="125" font-family="sans-serif" font-size="14" fill="#666">Role: SCION Edge AS</text>
    <text x="885" y="145" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">ASN: ffaa:0:1102</text>
    
    <rect x="910" y="170" width="200" height="60" rx="8" fill="#e3f2fd" stroke="#0052cc" stroke-width="2"/>
    <text x="1010" y="205" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0052cc" text-anchor="middle">Worker Nodes</text>

    <!-- Lines connecting Macro -->
    <!-- Line A to Core -->
    <path d="M 290 200 L 515 200" fill="none" stroke="#333" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
    <text x="400" y="190" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">BGP or L2 Underlay</text>
    <text x="400" y="220" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">SCION-over-UDP</text>

    <!-- Line Core to B -->
    <path d="M 715 200 L 900 200" fill="none" stroke="#333" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
    <text x="810" y="190" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">BGP or L2 Underlay</text>
    <text x="810" y="220" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">SCION-over-UDP</text>

    <line x1="50" y1="300" x2="1150" y2="300" stroke="#ccc" stroke-width="2" />


    <!-- ========================================== -->
    <!-- BOTTOM SECTION: MICRO TOPOLOGY (NODE/eBPF) -->
    <!-- ========================================== -->
    <text x="50" y="340" font-family="sans-serif" font-size="22" font-weight="bold" fill="#333">2. Micro Architecture (eBPF Hook Chaining inside Worker Node)</text>

    <!-- Node Boundary -->
    <rect x="50" y="370" width="1100" height="540" rx="10" fill="#ffffff" stroke="#666" stroke-width="2" />
    <text x="70" y="405" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333">Linux Worker Node (eth0)</text>

    <!-- The Pod -->
    <rect x="100" y="440" width="180" height="80" rx="5" fill="#f1f8e9" stroke="#558b2f" stroke-width="2"/>
    <text x="190" y="475" font-family="sans-serif" font-size="16" font-weight="bold" fill="#33691e" text-anchor="middle">Application Pod</text>
    <text x="190" y="495" font-family="sans-serif" font-size="12" fill="#558b2f" text-anchor="middle">Labels: app=frontend</text>

    <rect x="150" y="520" width="80" height="30" fill="#fff" stroke="#0052cc" stroke-width="2"/>
    <text x="190" y="540" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0052cc" text-anchor="middle">veth</text>

    <!-- CilION Control Plane -->
    <rect x="800" y="400" width="280" height="150" rx="8" fill="#ede7f6" stroke="#673ab7" stroke-width="2"/>
    <text x="940" y="430" font-family="sans-serif" font-size="18" font-weight="bold" fill="#512da8" text-anchor="middle">CilION DaemonSet</text>
    <text x="940" y="455" font-family="sans-serif" font-size="13" fill="#673ab7" text-anchor="middle">(User-Space Control Plane)</text>
    <rect x="820" y="470" width="240" height="60" rx="5" fill="#fff" stroke="#673ab7" stroke-width="1"/>
    <text x="940" y="490" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Watches K8s API (CRDs, Pods)</text>
    <text x="940" y="510" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Fetches SCION Paths via sciond</text>

    <path d="M 850 550 L 850 630" fill="none" stroke="#673ab7" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <text x="860" y="590" font-family="sans-serif" font-size="12" font-weight="bold" fill="#512da8">Updates eBPF Maps</text>

    <!-- eBPF Maps -->
    <rect x="730" y="640" width="220" height="80" rx="5" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
    <text x="840" y="665" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">eBPF Maps (/sys/fs/bpf)</text>
    <text x="840" y="685" font-family="sans-serif" font-size="12" fill="#ef6c00" text-anchor="middle">1. pod_policy_map</text>
    <text x="840" y="705" font-family="sans-serif" font-size="12" fill="#ef6c00" text-anchor="middle">2. scion_path_cache</text>

    <!-- The Kernel Layer -->
    <rect x="100" y="580" width="600" height="280" rx="10" fill="#fafafa" stroke="#999" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="400" y="610" font-family="sans-serif" font-size="18" font-weight="bold" fill="#666" text-anchor="middle">Linux Kernel Networking Stack</text>

    <!-- EGRESS PIPELINE -->
    <rect x="120" y="640" width="560" height="80" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
    <text x="135" y="685" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2e7d32">EGRESS</text>

    <path d="M 190 550 L 190 635" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Cilium P1 Egress -->
    <rect x="230" y="650" width="160" height="60" rx="5" fill="#e3f2fd" stroke="#0052cc" stroke-width="2"/>
    <text x="310" y="670" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0052cc" text-anchor="middle">Cilium (TC - P1)</text>
    <text x="310" y="690" font-family="sans-serif" font-size="12" fill="#0052cc" text-anchor="middle">Network Policies</text>

    <path d="M 390 680 L 420 680" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- CilION P2 Egress -->
    <rect x="430" y="650" width="180" height="60" rx="5" fill="#ede7f6" stroke="#673ab7" stroke-width="2"/>
    <text x="520" y="670" font-family="sans-serif" font-size="14" font-weight="bold" fill="#512da8" text-anchor="middle">CilION (TC - P2)</text>
    <text x="520" y="690" font-family="sans-serif" font-size="12" fill="#512da8" text-anchor="middle">SCION Encapsulation</text>

    <path d="M 610 680 L 720 680" fill="none" stroke="#ef6c00" stroke-width="2" stroke-dasharray="4,2"/> <!-- Map lookup arrow -->


    <!-- INGRESS PIPELINE -->
    <rect x="120" y="750" width="560" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="135" y="795" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c62828">INGRESS</text>

    <!-- CilION XDP Ingress -->
    <rect x="430" y="760" width="180" height="60" rx="5" fill="#ede7f6" stroke="#673ab7" stroke-width="2"/>
    <text x="520" y="780" font-family="sans-serif" font-size="14" font-weight="bold" fill="#512da8" text-anchor="middle">CilION (XDP)</text>
    <text x="520" y="800" font-family="sans-serif" font-size="12" fill="#512da8" text-anchor="middle">SCION Decapsulation</text>
    
    <path d="M 610 790 L 720 790" fill="none" stroke="#ef6c00" stroke-width="2" stroke-dasharray="4,2"/> <!-- Map lookup arrow -->

    <path d="M 430 790 L 400 790" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Cilium TC Ingress -->
    <rect x="230" y="760" width="160" height="60" rx="5" fill="#e3f2fd" stroke="#0052cc" stroke-width="2"/>
    <text x="310" y="780" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0052cc" text-anchor="middle">Cilium (TC Ingress)</text>
    <text x="310" y="800" font-family="sans-serif" font-size="12" fill="#0052cc" text-anchor="middle">L4/L7 Routing</text>

    <path d="M 230 790 L 170 790 C 170 790, 150 790, 150 720 C 150 600, 210 600, 210 555" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>


    <!-- Physical NIC -->
    <rect x="420" y="880" width="120" height="40" fill="#fff" stroke="#333" stroke-width="3"/>
    <text x="480" y="905" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">eth0 (NIC)</text>

    <!-- Connect Egress to NIC -->
    <path d="M 550 710 L 550 875" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Connect NIC to Ingress -->
    <path d="M 480 880 L 480 825" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>

</svg>